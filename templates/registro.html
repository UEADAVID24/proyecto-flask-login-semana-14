{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}

<h2>Registro de Usuario</h2>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" placeholder="Ingresa tu nombre" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="Ingresa tu correo" required><br><br>

    <label>Contraseña:</label><br>
    <input type="password" name="password" placeholder="Ingresa tu contraseña" required><br><br>

    <button type="submit">Registrarse</button>

</form>

<p>¿Ya tienes cuenta? 
    <a href="{{ url_for('login') }}">Inicia sesión aquí</a>
</p>

{% endblock %}
