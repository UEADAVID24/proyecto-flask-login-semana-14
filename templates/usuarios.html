<!DOCTYPE html>
<html>
<head>
<title>Usuarios</title>
</head>

<body>

<h2>Lista de Usuarios</h2>

<a href="/usuarios/agregar">Agregar Usuario</a>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Password</th>
<th>Acciones</th>
</tr>

{% for u in usuarios %}

<tr>
<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>{{u[2]}}</td>
<td>{{u[3]}}</td>

<td>
<a href="/usuarios/eliminar/{{u[0]}}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
